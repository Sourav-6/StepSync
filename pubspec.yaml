name: step_sync
description: "SRP Health – Social Fitness & Step Tracking Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.4

  # Google Sign-In

  # Step Tracking

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Charts
  fl_chart: ^0.70.2

  # UI & Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Utilities
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  intl: ^0.20.2
  uuid: ^4.5.3
  connectivity_plus: ^6.1.4

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.5
  health: ^13.3.1
  share_plus: ^10.1.4
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^22.0.1
  firebase_in_app_messaging: ^0.8.1+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

